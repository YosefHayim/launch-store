name: CI

# The full quality gate, re-run on every push to main and every PR. The local husky hook runs the same
# checks but can be bypassed (`--no-verify`), so CI is the authoritative gate.
#
# Composed from single-purpose, reusable workflows (lint / typecheck / docs / test / build / e2e), each
# `on: workflow_call` — so a red leg is isolated and named, and the shared cached-install lives in one
# composite action (.github/actions/setup-node-cached). See ADR 0009.
#
# - `CI Gate` is the single aggregated status check: require IT in branch protection, and a red leg
#   blocks the merge without pinning branch protection to each leg's name.
# - `report-failure` opens/updates a ci-failure issue when main goes red (never for PRs).

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege GITHUB_TOKEN: the checks only read the repo (and write the run's step summary, which
# needs no token scope). The report-failure job re-grants issues:write for itself, below.
permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/lint.yml
  typecheck:
    uses: ./.github/workflows/typecheck.yml
  docs:
    uses: ./.github/workflows/docs.yml
  test:
    uses: ./.github/workflows/test.yml
  build:
    uses: ./.github/workflows/build.yml
  e2e:
    uses: ./.github/workflows/e2e.yml

  gate:
    name: CI Gate
    needs: [lint, typecheck, docs, test, build, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require every gate to pass
        run: |
          echo "lint=${{ needs.lint.result }} typecheck=${{ needs.typecheck.result }} docs=${{ needs.docs.result }} test=${{ needs.test.result }} build=${{ needs.build.result }} e2e=${{ needs.e2e.result }}"
          test "${{ needs.lint.result }}" = "success" \
            && test "${{ needs.typecheck.result }}" = "success" \
            && test "${{ needs.docs.result }}" = "success" \
            && test "${{ needs.test.result }}" = "success" \
            && test "${{ needs.build.result }}" = "success" \
            && test "${{ needs.e2e.result }}" = "success"

  report-failure:
    name: Open issue on main failure
    needs: [lint, typecheck, docs, test, build, e2e]
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      issues: write
      actions: read
    uses: ./.github/workflows/report-failure.yml
