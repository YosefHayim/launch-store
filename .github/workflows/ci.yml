name: CI

# The full quality gate, re-run on every push to main and every PR. The local husky hook runs the
# same checks but can be bypassed (`--no-verify`), so CI is the authoritative gate. Unit tests mock
# the Mac-specific bits (openssl/security/fastlane), so they run on Linux; a real iOS build needs a
# physical Mac and isn't attempted here.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    name: node-${{ matrix.node }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      # Cache the installed dependency tree so an unchanged lockfile skips `npm ci` entirely. The key
      # binds OS + Node major + lockfile hash; any dependency change flips the hash and forces a clean
      # reinstall. Deliberately NO restore-keys — a partial node_modules carried over from a different
      # lockfile is a silent correctness hazard, so we reuse an EXACT match or reinstall from scratch.
      # `cache: npm` above still warms ~/.npm, so the reinstall on a miss stays fast.
      - name: Cache node_modules
        id: node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node${{ matrix.node }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      # docs/commands.md, llms.txt, and llms-full.txt are generated from the commander tree in
      # src/cli/ by `npm run docs:gen`. This fails the PR if they're stale, so the AI-facing and
      # human-facing docs can't drift from the real command surface (issue #89). Offline + deterministic,
      # so it lives in the per-PR gate rather than a separate workflow like schema-drift.yml.
      - name: Docs are in sync with the CLI
        run: npm run docs:check
      - name: Test (with coverage)
        run: npm run test:coverage | tee coverage.txt
      - run: npm run build
      - name: Smoke-test the built CLI
        # The unit tests run against src/ via tsx; this proves the COMPILED artifact we publish
        # actually boots on each supported Node version (catches a broken dist before release).
        run: |
          node dist/cli/index.js --version
          node dist/cli/index.js --help
          node dist/cli/index.js explain csr
      - name: Coverage summary
        if: always()
        run: |
          {
            echo '### Coverage (node ${{ matrix.node }})'
            echo '```'
            tail -n 20 coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
